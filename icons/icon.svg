<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Named Curl Icon</title>
  <desc id="desc">A rounded blue square with a white terminal-style curl arrow.</desc>
  <defs>
    <linearGradient id="bg" x1="16" y1="16" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f3d5e"/>
      <stop offset="1" stop-color="#0b6e8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#06263d" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <path d="M34 67 L55 48 L34 29" stroke-width="11"/>
    <path d="M67 83 H95" stroke-width="11"/>
    <path d="M69 34 H91" stroke="#87e6ff" stroke-width="8" opacity="0.95"/>
  </g>
</svg>