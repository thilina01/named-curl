name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate tag format
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' is not a supported release tag. Expected vX.Y.Z." >&2
            exit 1
          fi

      - name: Validate tagged commit is on master
        run: |
          git fetch origin master --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Tagged commit $GITHUB_SHA is not reachable from origin/master." >&2
            exit 1
          fi

      - name: Validate manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node --input-type=module -e "import fs from 'node:fs'; const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8')); process.stdout.write(String(manifest.version || ''));" )
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [[ "$MANIFEST_VERSION" != "$TAG_VERSION" ]]; then
            echo "manifest.json version '$MANIFEST_VERSION' does not match tag '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

      - name: Run validation
        run: |
          npm test
          npm run check

      - name: Determine previous release tag
        id: previous_tag
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -vx "$GITHUB_REF_NAME" | head -n 1 || true)
          echo "value=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Package extension
        id: package
        run: |
          ASSET_BASENAME="named-curl-${GITHUB_REF_NAME}"
          ZIP_PATH="dist/${ASSET_BASENAME}.zip"
          CHECKSUM_PATH="dist/${ASSET_BASENAME}.sha256"

          mkdir -p dist
          zip -qr "$ZIP_PATH" . \
            -x '.git/*' \
            -x '.github/*' \
            -x 'node_modules/*' \
            -x 'dist/*' \
            -x 'tests/*' \
            -x 'scripts/*' \
            -x '*.md' \
            -x 'package.json' \
            -x '.gitignore'

          sha256sum "$ZIP_PATH" > "$CHECKSUM_PATH"

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$CHECKSUM_PATH" >> "$GITHUB_OUTPUT"
          echo "asset_basename=$ASSET_BASENAME" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ github.ref_name }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.value }}
          ASSET_BASENAME: ${{ steps.package.outputs.asset_basename }}
        with:
          script: |
            const tagName = process.env.TAG_NAME;
            const previousTag = process.env.PREVIOUS_TAG || undefined;
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: context.sha
            };

            if (previousTag) {
              params.previous_tag_name = previousTag;
            }

            const { data } = await github.rest.repos.generateReleaseNotes(params);
            const installSection = [
              '',
              '## Manual Install',
              `1. Download \`${process.env.ASSET_BASENAME}.zip\`.`,
              '2. Extract the archive to a local folder.',
              '3. Open the included `INSTALL.txt` file if you want a copy of these steps inside the extracted folder.',
              '4. Open `chrome://extensions` in Chrome.',
              '5. Enable Developer Mode.',
              '6. Click Load unpacked and select the extracted folder.'
            ].join('\n');

            core.setOutput('body', `${data.body}${installSection}`);

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Named Curl ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}